# XcodeGen spec — canonical project definition for bitaps VPN.
# Regenerate the .xcodeproj any time with:  xcodegen generate
# (install once: brew install xcodegen  — or  mint install yonaskolb/xcodegen)
name: BitapsVPN
options:
  bundleIdPrefix: app.bitaps.vpn
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""          # <-- set your Apple Team ID
    CODE_SIGN_STYLE: Automatic

targets:
  BitapsVPN:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bitaps.vpn
        PRODUCT_NAME: bitaps VPN
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: bitaps VPN
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Камера нужна для сканирования QR-кода конфигурации"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AppIcon-neon AppIcon-emerald AppIcon-lavender AppIcon-crimson AppIcon-mono"
        CODE_SIGN_ENTITLEMENTS: Config/BitapsVPN.entitlements
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    dependencies:
      - target: PacketTunnel
        embed: true
      - target: BitapsWidget
        embed: true
        platforms: [iOS]

  PacketTunnel:
    type: app-extension
    supportedDestinations: [iOS, macOS]
    sources:
      - path: PacketTunnel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bitaps.vpn.PacketTunnel
        PRODUCT_NAME: PacketTunnel
        CODE_SIGN_ENTITLEMENTS: Config/PacketTunnel.entitlements
        INFOPLIST_FILE: PacketTunnel/Info.plist

  # iOS WidgetKit + Live Activity extension (Dynamic Island / Lock Screen / home widget)
  BitapsWidget:
    type: app-extension
    supportedDestinations: [iOS]
    sources:
      - path: BitapsWidget
      - path: Shared
      - path: Sources/Core/DesignSystem/Theme.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bitaps.vpn.BitapsWidget
        PRODUCT_NAME: BitapsWidget
        INFOPLIST_FILE: BitapsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/BitapsWidget.entitlements
        SKIP_INSTALL: YES
